<!DOCTYPE html>
<html lang="sk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delič napätia</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body class="bg-gray-50 min-h-screen p-4 md:p-8 font-sans">
    <div class="max-w-2xl mx-auto bg-white rounded-3xl shadow-xl overflow-hidden">
        <div class="bg-green-600 p-6 text-white flex justify-between items-center">
            <h1 class="text-2xl font-bold"><i class="fa-solid fa-battery-half mr-2"></i>Delič napätia</h1>
            <a href="index.html"
                class="bg-green-700 hover:bg-green-800 px-4 py-2 rounded-lg text-sm transition">Späť</a>
        </div>

        <div class="p-8">
            <div class="flex justify-center mb-10">
                <div class="border-2 border-gray-200 rounded-2xl p-4 bg-gray-50 flex flex-col items-center">
                    <div class="w-1 h-8 bg-gray-400"></div>
                    <div class="px-4 py-2 bg-white border-2 border-gray-400 font-bold rounded">R1</div>
                    <div class="w-1 h-4 bg-gray-400"></div>
                    <div class="w-4 h-1 bg-gray-400 relative">
                        <div class="absolute left-6 -top-2 text-xs font-bold text-green-600">Vout</div>
                    </div>
                    <div class="w-1 h-4 bg-gray-400"></div>
                    <div class="px-4 py-2 bg-white border-2 border-gray-400 font-bold rounded">R2</div>
                    <div class="w-1 h-8 bg-gray-400"></div>
                    <div class="w-8 h-1 bg-gray-400"></div>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase mb-1">Vstupné napätie (Vin)</label>
                    <input type="number" id="vin" oninput="calcDiv()"
                        class="w-full p-4 bg-gray-50 border-2 border-transparent focus:border-green-500 rounded-xl outline-none transition"
                        placeholder="V">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase mb-1">Rezistor R1 [Ω]</label>
                    <input type="number" id="r1" oninput="calcDiv()"
                        class="w-full p-4 bg-gray-50 border-2 border-transparent focus:border-green-500 rounded-xl outline-none transition"
                        placeholder="Ω">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase mb-1">Rezistor R2 [Ω]</label>
                    <input type="number" id="r2" oninput="calcDiv()"
                        class="w-full p-4 bg-gray-50 border-2 border-transparent focus:border-green-500 rounded-xl outline-none transition"
                        placeholder="Ω">
                </div>
                <div
                    class="bg-green-50 border-2 border-green-100 rounded-xl p-4 flex flex-col justify-center items-center">
                    <span class="text-xs font-bold text-green-600 uppercase tracking-tighter">Výstupné napätie
                        (Vout)</span>
                    <div id="vout" class="text-3xl font-black text-green-800">0.00 V</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function calcDiv() {
            const vin = parseFloat(document.getElementById('vin').value);
            const r1 = parseFloat(document.getElementById('r1').value);
            const r2 = parseFloat(document.getElementById('r2').value);

            if (!isNaN(vin) && !isNaN(r1) && !isNaN(r2) && (r1 + r2) !== 0) {
                const vout = vin * (r2 / (r1 + r2));
                document.getElementById('vout').innerText = vout.toFixed(3) + " V";
            } else {
                document.getElementById('vout').innerText = "0.00 V";
            }
        }
    </script>
</body>

</html>
