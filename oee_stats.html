<!DOCTYPE html>
<html lang="sk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OEE Analytics - Engineering Tools</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body class="bg-gray-50 min-h-screen font-sans">

    <nav class="bg-blue-700 text-white p-4 shadow-md">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <a href="index.html" class="hover:text-blue-200 transition-colors">
                <i class="fa-solid fa-arrow-left mr-2"></i> Späť na Hub
            </a>
            <h1 class="font-bold uppercase tracking-widest text-sm">OEE Performance Dashboard</h1>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto py-8 px-4">
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                <p class="text-gray-400 text-xs uppercase font-bold mb-1 text-center">Celkové OEE</p>
                <h3 id="oee-total" class="text-3xl font-black text-blue-600 text-center">0%</h3>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                <p class="text-gray-400 text-xs uppercase font-bold mb-1 text-center">Dostupnosť (A)</p>
                <h3 id="oee-avail" class="text-3xl font-black text-emerald-500 text-center">0%</h3>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                <p class="text-gray-400 text-xs uppercase font-bold mb-1 text-center">Výkon (P)</p>
                <h3 id="oee-perf" class="text-3xl font-black text-amber-500 text-center">0%</h3>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                <p class="text-gray-400 text-xs uppercase font-bold mb-1 text-center">Kvalita (Q)</p>
                <h3 id="oee-qual" class="text-3xl font-black text-rose-500 text-center">0%</h3>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                <h2 class="text-lg font-bold mb-4">Trend OEE podľa objednávok</h2>
                <canvas id="chartOEE"></canvas>
            </div>

            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                <h2 class="text-lg font-bold mb-4">Analýza prestojov (Downtime)</h2>
                <canvas id="chartDowntime"></canvas>
            </div>
        </div>
    </main>

    <script>
        // Simulujeme načítanie súboru (v reálnom prostredí použite fetch('test_orders.json'))
        // Pre účely dema predpokladám, že súbor je v tom istom priečinku
        async function loadData() {
            try {
                const response = await fetch('test_orders.json');
                const data = await response.json();
                processOEE(data);
            } catch (err) {
                console.error("Nepodarilo sa načítať JSON súbor. Uistite sa, že je na serveri.", err);
                alert("Súbor test_orders.json nebol nájdený!");
            }
        }

        function processOEE(data) {
            const keys = Object.keys(data);
            let totalAvailability = 0, totalPerformance = 0, totalQuality = 0;
            const labels = [];
            const oeeValues = [];
            const downtimeReasons = {};

            keys.forEach(id => {
                const order = data[id];
                let prodTime = 0, setupTime = 0, downTime = 0;

                order.history.forEach(h => {
                    const duration = (h.end - h.start) / 60000; // v minútach
                    if (h.state === "PRODUCTION") prodTime += duration;
                    if (h.state === "SETUP") setupTime += duration;
                    if (h.state === "DOWNTIME") {
                        downTime += duration;
                        downtimeReasons[h.reason] = (downtimeReasons[h.reason] || 0) + duration;
                    }
                });

                const totalScheduled = prodTime + setupTime + downTime;

                // --- VÝPOČET OEE ---
                // 1. Availability = Reálny čas výroby / Plánovaný čas
                const A = totalScheduled > 0 ? (prodTime / (prodTime + downTime)) : 0;

                // 2. Performance = (Vyrobené kusy * Ideálny takt) / Reálny čas výroby
                // Predpokladáme ideálny takt 2 min/kus pre toto demo
                const idealCycleTime = 2;
                const P = prodTime > 0 ? ((order.goodPieces + order.badPieces) * idealCycleTime / prodTime) : 0;

                // 3. Quality = Dobré kusy / Všetky kusy
                const totalPieces = order.goodPieces + order.badPieces;
                const Q = totalPieces > 0 ? (order.goodPieces / totalPieces) : 0;

                const OEE = (A * P * Q) * 100;

                labels.push(`Obj. ${id}`);
                oeeValues.push(OEE.toFixed(1));

                totalAvailability += A;
                totalPerformance += P;
                totalQuality += Q;
            });

            // Priemery pre dashboard
            const count = keys.length;
            document.getElementById('oee-avail').innerText = ((totalAvailability / count) * 100).toFixed(1) + "%";
            document.getElementById('oee-perf').innerText = ((totalPerformance / count) * 100).toFixed(1) + "%";
            document.getElementById('oee-qual').innerText = ((totalQuality / count) * 100).toFixed(1) + "%";

            const finalOEE = ((totalAvailability / count) * (totalPerformance / count) * (totalQuality / count)) * 100;
            document.getElementById('oee-total').innerText = finalOEE.toFixed(1) + "%";

            // GRAF 1: Line Chart pre OEE
            new Chart(document.getElementById('chartOEE'), {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'OEE %',
                        data: oeeValues,
                        borderColor: '#2563eb',
                        backgroundColor: 'rgba(37, 99, 235, 0.1)',
                        fill: true,
                        tension: 0.4
                    }]
                }
            });

            // GRAF 2: Pie Chart pre Prestoje
            new Chart(document.getElementById('chartDowntime'), {
                type: 'doughnut',
                data: {
                    labels: Object.keys(downtimeReasons),
                    datasets: [{
                        data: Object.values(downtimeReasons),
                        backgroundColor: ['#f43f5e', '#fbbf24', '#38bdf8', '#818cf8', '#a855f7']
                    }]
                }
            });
        }

        loadData();
    </script>
</body>

</html>
