<!DOCTYPE html>
<html lang="sk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BasicMOST Pro - Purple Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');

        body {
            font-family: 'Inter', sans-serif;
        }

        /* Aktívna karta vo fialovej */
        .tab-active {
            border-bottom: 4px solid #a855f7;
            color: #a855f7;
        }

        .is-manager .manager-only {
            display: flex !important;
        }

        .manager-only {
            display: none;
        }

        .dragging {
            opacity: 0.5;
            background: #faf5ff;
        }

        .draggable-item {
            cursor: grab;
        }
    </style>
</head>

<body class="bg-gray-100 min-h-screen p-4 md:p-8">

    <div class="max-w-5xl mx-auto bg-white rounded-3xl shadow-xl overflow-hidden">
        <div class="bg-purple-600 p-6 text-white flex justify-between items-center">
            <h1 class="text-2xl font-bold tracking-tighter">
                <i class="fa-solid fa-stopwatch mr-2"></i>BasicMOST
            </h1>
            <div class="flex items-center gap-4">
                <div class="flex gap-2 text-sm">
                    <button onclick="exportData()" title="Export JSON" class="hover:text-purple-200"><i
                            class="fa-solid fa-download"></i></button>
                    <label title="Import JSON" class="cursor-pointer hover:text-purple-200">
                        <i class="fa-solid fa-upload"></i>
                        <input type="file" class="hidden" onchange="importData(event)">
                    </label>
                    <button onclick="toggleManager()" id="mgrBtn" title="Manažérsky mód"
                        class="hover:text-purple-200"><i class="fa-solid fa-lock"></i></button>
                </div>
                <a href="index.html"
                    class="bg-purple-700 hover:bg-purple-800 px-4 py-2 rounded-lg text-sm transition font-bold">Späť</a>
            </div>
        </div>

        <div class="flex border-b bg-white">
            <button onclick="showTab('most')" id="t-most"
                class="flex-1 py-4 font-bold uppercase tracking-wider tab-active transition">Kódy MOST</button>
            <button onclick="showTab('comp')" id="t-comp"
                class="flex-1 py-4 font-bold uppercase tracking-wider text-gray-500 transition">Bloky</button>
            <button onclick="showTab('dps')" id="t-dps"
                class="flex-1 py-4 font-bold uppercase tracking-wider text-gray-500 transition">Norma DPS</button>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-0">
            <div class="lg:col-span-5 p-6 border-r border-gray-100 bg-gray-50/30">

                <div id="f-most" class="space-y-4">
                    <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-200">
                        <label class="text-[10px] font-bold text-gray-400 uppercase">Názov a Kategória</label>
                        <input type="text" id="mName" placeholder="Názov operácie..."
                            class="w-full p-2 mb-2 text-sm border-b outline-none focus:border-purple-500">
                        <select id="mCat" class="w-full p-2 text-sm font-bold bg-gray-50 rounded-lg">
                            <option>Príprava súčiastok</option>
                            <option>Osadzovanie THT</option>
                            <option>Spájkovanie</option>
                            <option>Rework</option>
                            <option>Všeobecné</option>
                        </select>
                    </div>
                    <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-200">
                        <label class="text-[10px] font-bold text-gray-400 uppercase">Sekvencia</label>
                        <select id="mModel" onchange="buildSeq()"
                            class="w-full p-2 mb-3 text-xs font-bold text-purple-600 bg-purple-50 rounded-lg outline-none">
                            <option value="V">Všeobecný pohyb (ABG AB P A)</option>
                            <option value="R">Riadený pohyb (ABG MX I A)</option>
                            <option value="N">Nástroj (ABG AB P T AB P A)</option>
                        </select>
                        <div id="mSeq" class="grid grid-cols-4 gap-2"></div>
                    </div>
                    <button onclick="saveMost()" id="btnSaveMost"
                        class="w-full bg-purple-600 text-white py-4 rounded-2xl font-black shadow-lg hover:bg-purple-700 transition uppercase tracking-widest">Uložiť
                        kód</button>
                </div>

                <div id="f-comp" class="hidden space-y-4">
                    <input type="text" id="cName" placeholder="Názov bloku..."
                        class="w-full p-3 bg-white border rounded-xl shadow-sm">
                    <div class="flex gap-2">
                        <select id="cSel" class="flex-1 p-3 border rounded-xl text-sm bg-white"></select>
                        <button onclick="addStepC()" class="bg-purple-600 text-white px-5 rounded-xl"><i
                                class="fa-solid fa-plus"></i></button>
                    </div>
                    <ul id="cPre"
                        class="space-y-2 p-2 bg-white rounded-xl min-h-[150px] border border-dashed border-gray-300"
                        ondragover="allowDrop(event)"></ul>
                    <button onclick="saveComp()" id="btnSaveComp"
                        class="w-full bg-purple-600 text-white py-4 rounded-2xl font-black uppercase shadow-lg">Uložiť
                        blok</button>
                </div>

                <div id="f-dps" class="hidden space-y-4">
                    <input type="text" id="dName" placeholder="Označenie DPS..."
                        class="w-full p-3 bg-white border rounded-xl shadow-sm font-bold">
                    <div class="flex gap-2">
                        <select id="dSel" class="flex-1 p-3 border rounded-xl text-sm bg-white"></select>
                        <input type="number" id="dQty" value="1"
                            class="w-16 p-2 border rounded-xl text-center font-bold">
                    </div>
                    <button onclick="addStepD()"
                        class="w-full bg-gray-800 text-white py-2 rounded-xl text-xs font-bold uppercase">+ Pridať
                        položku</button>
                    <ul id="dPre"
                        class="space-y-2 p-2 bg-purple-50/50 rounded-xl min-h-[150px] border-2 border-dashed border-purple-100"
                        ondragover="allowDrop(event)"></ul>
                    <button onclick="saveDps()" id="btnSaveDps"
                        class="w-full bg-purple-600 text-white py-4 rounded-2xl font-black uppercase shadow-lg">Vytvoriť
                        normu</button>
                </div>
            </div>

            <div class="lg:col-span-7 p-6 bg-white min-h-[500px]">
                <div id="l-most" class="space-y-2"></div>
                <div id="l-comp" class="hidden space-y-2"></div>
                <div id="l-dps" class="hidden space-y-2"></div>
            </div>
        </div>
    </div>

    <script>
        const MODELS = { V: ["A", "B", "G", "A", "B", "P", "A"], R: ["A", "B", "G", "M", "X", "I", "A"], N: ["A", "B", "G", "A", "B", "P", "T", "A", "B", "P", "A"] };
        const CATS = ["Príprava súčiastok", "Osadzovanie THT", "Spájkovanie", "Rework", "Všeobecné"];
        let data = { mostOperations: {}, compositeOperations: [], dpsNorms: [] };
        CATS.forEach(c => data.mostOperations[c] = []);
        let tmpC = [], tmpD = [], isMgr = false, editId = null;

        window.onload = () => { buildSeq(); refresh(); };

        function toggleManager() {
            isMgr = !isMgr;
            document.body.classList.toggle('is-manager', isMgr);
            document.getElementById("mgrBtn").innerHTML = isMgr ? '<i class="fa-solid fa-unlock text-yellow-300"></i>' : '<i class="fa-solid fa-lock"></i>';
            refresh();
        }

        function showTab(t) {
            ["most", "comp", "dps"].forEach(x => {
                document.getElementById(`f-${x}`).classList.add("hidden");
                document.getElementById(`l-${x}`).classList.add("hidden");
                document.getElementById(`t-${x}`).className = "flex-1 py-4 font-bold uppercase tracking-wider text-gray-500 transition";
            });
            document.getElementById(`f-${t}`).classList.remove("hidden");
            document.getElementById(`l-${t}`).classList.remove("hidden");
            document.getElementById(`t-${t}`).className = "flex-1 py-4 font-bold uppercase tracking-wider tab-active transition";
            cancelEdit();
        }

        function buildSeq() {
            const m = document.getElementById("mModel").value;
            const cont = document.getElementById("mSeq");
            cont.innerHTML = "";
            MODELS[m].forEach((l, i) => {
                cont.innerHTML += `<div class="flex flex-col items-center bg-gray-50 p-2 rounded-xl border border-gray-100">
                <span class="text-[9px] font-black text-purple-400">${l}</span>
                <select id="s_${i}" class="text-xs font-bold bg-transparent outline-none">
                    ${[0, 1, 3, 6, 10, 16].map(v => `<option value="${v}">${v}</option>`).join('')}
                </select>
            </div>`;
            });
        }

        function parseSequence(seq, modelType) {
            const model = MODELS[modelType];
            const values = [];
            let tempStr = seq;
            model.forEach(letter => {
                const regex = new RegExp(`^${letter}(\\d+)`);
                const match = tempStr.match(regex);
                if (match) { values.push(match[1]); tempStr = tempStr.replace(match[0], ''); }
                else { values.push(0); }
            });
            return values;
        }

        function saveMost() {
            const name = document.getElementById("mName").value;
            const cat = document.getElementById("mCat").value;
            if (!name) return alert("Zadaj názov!");
            const model = document.getElementById("mModel").value;
            let code = "", tmu = 0;
            MODELS[model].forEach((l, i) => {
                const v = parseInt(document.getElementById(`s_${i}`).value);
                code += l + v; tmu += v;
            });
            const obj = { id: editId || 'op_' + Date.now(), name, sequence: code, tmuPerPiece: tmu * 10 };
            if (editId) { for (let c in data.mostOperations) data.mostOperations[c] = data.mostOperations[c].filter(x => x.id !== editId); }
            data.mostOperations[cat].push(obj);
            cancelEdit(); refresh();
        }

        function addStepC() { const id = document.getElementById("cSel").value; if (id) { tmpC.push(id); renderTmpC(); } }
        function renderTmpC() {
            const cont = document.getElementById("cPre"); cont.innerHTML = "";
            tmpC.forEach((id, i) => {
                const op = findMost(id);
                const li = document.createElement("li");
                li.className = "flex justify-between items-center text-xs bg-gray-50 p-2 rounded-lg border draggable-item";
                li.draggable = isMgr; li.dataset.index = i;
                li.innerHTML = `<span><i class="fa-solid fa-grip-vertical mr-2 text-gray-300"></i>${op?.name}</span>
                            <button onclick="tmpC.splice(${i},1);renderTmpC()" class="text-red-400"><i class="fa-solid fa-xmark"></i></button>`;
                li.ondragstart = (e) => { e.dataTransfer.setData("text", i); li.classList.add("dragging"); };
                li.ondragend = () => li.classList.remove("dragging");
                li.ondrop = (e) => handleDrop(e, 'comp');
                cont.appendChild(li);
            });
        }

        function addStepD() { const id = document.getElementById("dSel").value, q = parseInt(document.getElementById("dQty").value); if (id) { tmpD.push({ id, quantity: q }); renderTmpD(); } }
        function renderTmpD() {
            const cont = document.getElementById("dPre"); cont.innerHTML = "";
            tmpD.forEach((step, i) => {
                const op = findAny(step.id);
                const li = document.createElement("li");
                li.className = "flex justify-between items-center text-xs bg-white p-2 rounded-lg border draggable-item shadow-sm";
                li.draggable = isMgr; li.dataset.index = i;
                li.innerHTML = `
                <div class="flex items-center gap-2">
                    <i class="fa-solid fa-grip-vertical text-purple-200"></i>
                    <input type="number" value="${step.quantity}" onchange="tmpD[${i}].quantity=parseInt(this.value);refresh()" class="w-12 text-center font-bold bg-purple-50 rounded border border-purple-100">
                    <span class="truncate max-w-[150px] font-medium">${op?.name}</span>
                </div>
                <button onclick="tmpD.splice(${i},1);renderTmpD()" class="text-red-400"><i class="fa-solid fa-trash"></i></button>`;
                li.ondragstart = (e) => { e.dataTransfer.setData("text", i); li.classList.add("dragging"); };
                li.ondragend = () => li.classList.remove("dragging");
                li.ondrop = (e) => handleDrop(e, 'dps');
                cont.appendChild(li);
            });
        }

        function allowDrop(e) { e.preventDefault(); }
        function handleDrop(e, type) {
            e.preventDefault();
            const fromIdx = parseInt(e.dataTransfer.getData("text"));
            const target = e.target.closest("li");
            if (!target) return;
            const toIdx = parseInt(target.dataset.index);
            const arr = type === 'comp' ? tmpC : tmpD;
            const item = arr.splice(fromIdx, 1)[0];
            arr.splice(toIdx, 0, item);
            type === 'comp' ? renderTmpC() : renderTmpD();
        }

        function saveComp() {
            const name = document.getElementById("cName").value; if (!name || tmpC.length === 0) return;
            const obj = { id: editId || 'comp_' + Date.now(), name, category: "Všeobecné", items: [...tmpC] };
            if (editId) { const idx = data.compositeOperations.findIndex(x => x.id === editId); data.compositeOperations[idx] = obj; }
            else { data.compositeOperations.push(obj); }
            cancelEdit(); refresh();
        }

        function saveDps() {
            const name = document.getElementById("dName").value; if (!name || tmpD.length === 0) return;
            const obj = { id: editId || 'dps_' + Date.now(), name, items: [...tmpD] };
            if (editId) { const idx = data.dpsNorms.findIndex(x => x.id === editId); data.dpsNorms[idx] = obj; }
            else { data.dpsNorms.push(obj); }
            cancelEdit(); refresh();
        }

        function refresh() {
            renderLMost(); renderLComp(); renderLDps();
            const cs = document.getElementById("cSel"); const ds = document.getElementById("dSel");
            cs.innerHTML = "<option value=''>-- Vybrať kód --</option>";
            ds.innerHTML = "<option value=''>-- Vybrať kód/blok --</option>";
            for (let c in data.mostOperations) {
                data.mostOperations[c].forEach(o => {
                    cs.appendChild(new Option(o.name, o.id));
                    ds.appendChild(new Option("[M] " + o.name, o.id));
                });
            }
            data.compositeOperations.forEach(c => ds.appendChild(new Option("[B] " + c.name, c.id)));
        }

        function renderLMost() {
            const cont = document.getElementById("l-most"); cont.innerHTML = "";
            for (let c in data.mostOperations) {
                if (data.mostOperations[c].length === 0) continue;
                cont.innerHTML += `<div class="text-[10px] font-black text-gray-300 uppercase mt-4 mb-1 border-b tracking-tighter">${c}</div>`;
                data.mostOperations[c].forEach(o => {
                    cont.innerHTML += `<div class="flex justify-between items-center bg-white p-3 rounded-xl border border-gray-100 hover:shadow-md transition">
                    <div><div class="font-bold text-gray-800 text-sm">${o.name}</div><div class="text-[10px] text-purple-500 font-bold">${o.sequence} | ${o.tmuPerPiece} TMU</div></div>
                    <div class="manager-only gap-2">
                        <button onclick="loadEdit('most','${o.id}')" class="text-purple-500"><i class="fa-solid fa-pen-to-square"></i></button>
                        <button onclick="del('most','${o.id}')" class="text-red-300 hover:text-red-500"><i class="fa-solid fa-trash"></i></button>
                    </div>
                </div>`;
                });
            }
        }

        function renderLComp() {
            const cont = document.getElementById("l-comp"); cont.innerHTML = "";
            data.compositeOperations.forEach(c => {
                const tmu = c.items.reduce((s, id) => s + (findMost(id)?.tmuPerPiece || 0), 0);
                cont.innerHTML += `<div class="flex justify-between items-center bg-purple-50/50 p-3 rounded-xl border border-purple-100">
                <div><div class="font-bold text-purple-900 text-sm">${c.name}</div><div class="text-[10px] text-purple-400 font-black uppercase">${tmu} TMU | ${c.items.length} krokov</div></div>
                <div class="manager-only gap-2">
                    <button onclick="loadEdit('comp','${c.id}')" class="text-purple-500"><i class="fa-solid fa-pen-to-square"></i></button>
                    <button onclick="del('comp','${c.id}')" class="text-red-400"><i class="fa-solid fa-trash"></i></button>
                </div>
            </div>`;
            });
        }

        function renderLDps() {
            const cont = document.getElementById("l-dps"); cont.innerHTML = "";
            data.dpsNorms.forEach(d => {
                let total = 0; d.items.forEach(it => { total += (findAny(it.id)?.tmuPerPiece || 0) * it.quantity; });
                cont.innerHTML += `<div class="bg-white p-5 rounded-2xl border border-gray-100 flex justify-between items-center shadow-sm hover:border-purple-200 transition">
                <div><div class="text-lg font-black text-gray-800">${d.name}</div><div class="text-purple-600 font-bold text-sm">${(total * 0.036).toFixed(2)} sek / ks</div></div>
                <div class="flex gap-2">
                    <div class="manager-only gap-2 mr-2 border-r pr-2">
                        <button onclick="loadEdit('dps','${d.id}')" class="p-2 text-purple-500"><i class="fa-solid fa-pen-to-square"></i></button>
                        <button onclick="del('dps','${d.id}')" class="p-2 text-red-400"><i class="fa-solid fa-trash"></i></button>
                    </div>
                    <button onclick="generatePDF('${d.id}')" class="bg-purple-600 text-white px-4 py-2 rounded-lg text-xs font-bold uppercase shadow-md hover:bg-purple-700 transition">PDF</button>
                </div>
            </div>`;
            });
        }

        function findMost(id) { for (let c in data.mostOperations) { const f = data.mostOperations[c].find(x => x.id === id); if (f) return f; } return null; }
        function findAny(id) {
            const m = findMost(id); if (m) return m;
            const c = data.compositeOperations.find(x => x.id === id);
            if (c) { return { name: c.name, tmuPerPiece: c.items.reduce((s, mid) => s + (findMost(mid)?.tmuPerPiece || 0), 0) }; }
            return null;
        }

        function loadEdit(type, id) {
            editId = id; showTab(type);
            if (type === 'most') {
                const it = findMost(id); document.getElementById("mName").value = it.name;
                let mType = "V"; if (it.sequence.includes("M")) mType = "R"; if (it.sequence.includes("T")) mType = "N";
                document.getElementById("mModel").value = mType; buildSeq();
                const values = parseSequence(it.sequence, mType);
                values.forEach((v, i) => { if (document.getElementById(`s_${i}`)) document.getElementById(`s_${i}`).value = v; });
                document.getElementById("btnSaveMost").innerText = "Aktualizovať kód";
            }
            if (type === 'comp') { const it = data.compositeOperations.find(x => x.id === id); document.getElementById("cName").value = it.name; tmpC = [...it.items]; renderTmpC(); document.getElementById("btnSaveComp").innerText = "Uložiť zmeny"; }
            if (type === 'dps') { const it = data.dpsNorms.find(x => x.id === id); document.getElementById("dName").value = it.name; tmpD = [...it.items]; renderTmpD(); document.getElementById("btnSaveDps").innerText = "Uložiť zmeny"; }
        }

        function cancelEdit() {
            editId = null; tmpC = []; tmpD = [];
            document.getElementById("btnSaveMost").innerText = "Uložiť kód";
            document.getElementById("btnSaveComp").innerText = "Uložiť blok";
            document.getElementById("btnSaveDps").innerText = "Vytvoriť normu";
            document.getElementById("mName").value = ""; document.getElementById("cName").value = ""; document.getElementById("dName").value = "";
            renderTmpC(); renderTmpD();
        }

        function del(type, id) {
            if (!confirm("Zmazať?")) return;
            if (type === 'most') { for (let c in data.mostOperations) data.mostOperations[c] = data.mostOperations[c].filter(x => x.id !== id); }
            if (type === 'comp') data.compositeOperations = data.compositeOperations.filter(x => x.id !== id);
            if (type === 'dps') data.dpsNorms = data.dpsNorms.filter(x => x.id !== id);
            refresh();
        }

        function exportData() {
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
            const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = "most_data.json"; a.click();
        }

        function importData(e) {
            const reader = new FileReader();
            reader.onload = (event) => {
                const imported = JSON.parse(event.target.result);
                if (imported.mostOperations) { data = imported; refresh(); }
            };
            reader.readAsText(e.target.files[0]);
        }

        function generatePDF(id) {
                const dps = data.dpsNorms.find(x => x.id === id);
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF();

                // Funkcia na odstránenie diakritiky, aby PDF nepadalo na znakoch ako 'č'
                const cleanText = (text) => text.normalize("NFD").replace(/[\u0300-\u036f]/g, "");

                doc.setFontSize(20);
                doc.text("PRODUCTION TIME STANDARD", 14, 20);

                doc.setFontSize(10);
                doc.text("Project: " + cleanText(dps.name), 14, 28);
                doc.text("Date: " + new Date().toLocaleDateString(), 14, 34);

                const tableData = [];
                let totalTMU = 0;

                dps.items.forEach((it, idx) => {
                    const op = findAny(it.id);
                    const tmu = op.tmuPerPiece * it.quantity;
                    totalTMU += tmu;
                    // Vyčistíme aj popis operácie od problematických znakov
                    tableData.push([
                        idx + 1,
                        cleanText(op.name),
                        it.quantity,
                        op.tmuPerPiece,
                        tmu,
                        (tmu * 0.036).toFixed(2) + "s"
                    ]);
                });

                doc.autoTable({
                    startY: 40,
                    head: [['#', 'Operation Description', 'Qty', 'TMU/pc', 'Total TMU', 'Time (s)']],
                    body: tableData,
                    foot: [['', 'TOTAL PRODUCTION TIME', '', '', totalTMU, (totalTMU * 0.036).toFixed(2) + " s"]],
                    headStyles: { fillStyle: [147, 51, 234] }, // Fialová (Purple 600)
                    styles: { fontSize: 9 }
                });

                doc.save(`Standard_${cleanText(dps.name)}.pdf`);
            }
    </script>
</body>

</html>
