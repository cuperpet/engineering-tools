<!DOCTYPE html>
<html lang="sk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPC-A-610 Visual Standard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .active-link {
            background-color: #f0f4ff;
            color: #4338ca;
            border-left: 4px solid #4338ca;
            font-weight: 800;
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        #sidebar {
            transition: transform 0.3s ease-in-out;
        }

        @media (max-width: 768px) {
            .sidebar-hidden {
                transform: translateX(-100%);
            }

            .sidebar-visible {
                transform: translateX(0);
            }
        }

        .menu-content {
            transition: max-height 0.3s ease-out;
            overflow: hidden;
        }

        .menu-collapsed {
            max-height: 0;
        }

        .menu-expanded {
            max-height: 1500px;
        }
    </style>
</head>

<body class="bg-gray-50 h-screen overflow-hidden flex flex-col font-sans">

    <header
        class="bg-indigo-600 h-16 flex-shrink-0 flex items-center justify-between px-4 md:px-6 shadow-md text-white z-[100]">
        <div class="flex items-center gap-3">
            <button onclick="toggleSidebar()"
                class="md:hidden bg-indigo-700 p-2 rounded text-sm font-bold uppercase flex items-center gap-2">
                <i class="fa-solid fa-bars"></i> Kapitoly
            </button>
            <h1 class="hidden sm:block font-bold text-lg tracking-tight uppercase tracking-wider">IPC-A-610 Visual
                Standard</h1>
        </div>
        <a href="index.html"
            class="bg-indigo-700 hover:bg-indigo-800 px-6 py-2 rounded font-bold text-sm transition uppercase shadow-inner">Späť</a>
    </header>

    <div class="flex flex-grow overflow-hidden relative">

        <aside id="sidebar"
            class="fixed inset-y-0 left-0 z-[90] w-72 bg-white border-r shadow-2xl md:shadow-none md:relative md:translate-x-0 sidebar-hidden flex flex-col">
            <div class="p-4 border-b flex justify-between items-center md:hidden bg-gray-50">
                <span class="font-black text-indigo-600 uppercase text-xs italic">Kategórie IPC</span>
                <button onclick="toggleSidebar()" class="text-gray-400 text-2xl">&times;</button>
            </div>
            <div id="tree-menu" class="flex-grow overflow-y-auto p-2 no-scrollbar">
            </div>
        </aside>

        <div id="overlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black/50 z-[80] hidden md:hidden"></div>

        <main class="flex-grow overflow-y-auto p-4 md:p-10">
            <div id="display-container" class="max-w-5xl mx-auto h-full">
                <div class="flex flex-col items-center justify-center h-full text-gray-300 text-center">
                    <i class="fa-solid fa-microchip text-7xl mb-6 opacity-10"></i>
                    <p class="text-lg font-bold">Vyberte sekciu z menu vľavo</p>
                    <p class="text-sm opacity-60">Na mobile použite tlačidlo "KAPITOLY"</p>
                </div>
            </div>
        </main>
    </div>

    <script>
        const ipcData = [
            {
                chapter: "5",
                name: "Spájkovanie (Anomálie)",
                sections: [
                    { id: "5.2.1", title: "Zmáčanie (Wetting)", target: "Uhol zmáčania ≤ 90°", acceptable: "T1,2,3: Uhol ≤ 90°", defect: "Uhol > 90° (Nezmáčanie / Dewetting)" },
                    { id: "5.2.2", title: "Studený spoj", target: "Hladký, lesklý a súvislý spoj", acceptable: "N/A", defect: "Zrnitý, nerovnomerný povrch (Všetky triedy)" },
                    { id: "5.2.7.2", title: "Spájkové guľôčky", target: "Žiadne viditeľné guľôčky", acceptable: "Fixované v tavidle/laku, neporušujú izoláciu", defect: "Voľné guľôčky / porušenie min. vzdialenosti" },
                    { id: "5.2.7.3", title: "Spájkové mostíky", target: "Žiadne premostenie", acceptable: "N/A", defect: "Nežiaduce spojenie medzi vodičmi (Skrat)" }
                ]
            },
            {
                chapter: "8.3.2",
                name: "SMT - Čipové súčiastky",
                sections: [
                    { id: "8.3.2.1", title: "Bočný presah (A)", target: "Bez presahu", acceptable: "T2: A ≤ 50% W; T3: A ≤ 25% W", defect: "Presah väčší ako povolený limit" },
                    { id: "8.3.2.2", title: "Koncový presah (B)", target: "Koniec súčiastky vnútri padu", acceptable: "Koniec súčiastky lícuje s padom", defect: "Koniec súčiastky vyčnieva z padu von" },
                    { id: "8.3.2.5", title: "Min. šírka spoja (W)", target: "W = šírka súčiastky", acceptable: "T2,3: Min. 50% šírky vývodu", defect: "Spoj užší ako 50% šírky vývodu" },
                    { id: "8.3.2.9", title: "Náhrobok (Tombstoning)", target: "N/A", acceptable: "N/A", defect: "Súčiastka zdvihnutá na jednom konci" }
                ]
            },
            {
                chapter: "8.3.5",
                name: "SMT - Gull Wing (QFP, SO)",
                sections: [
                    { id: "8.3.5.1", title: "Bočný presah (A)", target: "Bez presahu", acceptable: "T2,3: A ≤ 25% W (šírky pinu)", defect: "Presah > 25% šírky pinu" },
                    { id: "8.3.5.4", title: "Výška päty (Heel Fillet)", target: "Výrazný meniskus v päte", acceptable: "V ≥ hrúbka pinu + zmáčanie", defect: "Päta nie je spájkovaná / nezmáčaná" },
                    { id: "8.3.5.7", title: "Koplanarita (Zdvih pinu)", target: "Pin leží na pade", acceptable: "N/A", defect: "Pin je nad hladinou spájky (Otvorený spoj)" }
                ]
            },
            {
                chapter: "8.3.12",
                name: "SMT - BGA (Ball Grid Array)",
                sections: [
                    { id: "8.3.12.1", title: "Zarovnanie (Offset)", target: "Stred guličky na stred padu", acceptable: "Offset ≤ 25% priemeru padu", defect: "Gulička mimo pad" },
                    { id: "8.3.12.2", title: "Bubliny (Voidy)", target: "Žiadne voidy", acceptable: "Max. 25% plochy guličky v RTG", defect: "> 25% plochy alebo trhliny v guličke" },
                    { id: "8.3.12.3", title: "BGA Mostík", target: "Čisté guličky", acceptable: "N/A", defect: "Premostenie dvoch guličiek" }
                ]
            },
            {
                chapter: "8.3.15",
                name: "SMT - QFN / DPAK",
                sections: [
                    { id: "8.3.15.1", title: "QFN Bočný presah", target: "Bez presahu", acceptable: "T1,2,3: A ≤ 25% W", defect: "Presah mimo metalizáciu" },
                    { id: "8.3.15.3", title: "QFN Výška spoja", target: "Zretelné zmáčanie boku", acceptable: "T2,3: Min. 25% výšky puzdra", defect: "Nedostatočná výška spájky na boku" }
                ]
            },
            {
                chapter: "10",
                name: "PCB / Čistota",
                sections: [
                    { id: "10.2.7", title: "Zdvihnutý pad", target: "Pad pevne drží", acceptable: "N/A", defect: "Meď je odlepená od laminátu" },
                    { id: "10.4.1", title: "Zvyšky tavidla", target: "Bez zvyškov", acceptable: "No-clean: nelepivé zvyšky", defect: "Vodivé alebo korozívne zvyšky" }
                ]
            }
        ];

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('overlay');
            sidebar.classList.toggle('sidebar-hidden');
            sidebar.classList.toggle('sidebar-visible');
            overlay.classList.toggle('hidden');
        }

        function toggleAccordion(idx) {
            const content = document.getElementById(`content-${idx}`);
            const icon = document.getElementById(`icon-${idx}`);
            content.classList.toggle('menu-collapsed');
            content.classList.toggle('menu-expanded');
            icon.classList.toggle('fa-chevron-right');
            icon.classList.toggle('fa-chevron-down');
        }

        function initMenu() {
            const menu = document.getElementById('tree-menu');
            ipcData.forEach((group, idx) => {
                const div = document.createElement('div');
                div.className = "mb-2 border-b border-gray-50 pb-1";
                div.innerHTML = `
                    <button onclick="toggleAccordion(${idx})" class="w-full flex items-center justify-between p-3 hover:bg-gray-50 rounded-lg text-gray-700 font-bold text-[10px] uppercase tracking-wider">
                        <span>Kap. ${group.chapter} - ${group.name}</span>
                        <i id="icon-${idx}" class="fa-solid fa-chevron-right text-[10px] text-gray-400"></i>
                    </button>
                    <div id="content-${idx}" class="menu-content menu-collapsed space-y-1 pl-2 pr-2">
                        ${group.sections.map(sec => `
                            <button onclick="showDetail('${sec.id}')" id="btn-${sec.id.replace(/\./g, '-')}" 
                                    class="nav-item w-full text-left px-3 py-2 rounded text-xs text-gray-500 hover:bg-indigo-50 hover:text-indigo-700 transition flex items-center gap-3">
                                <span class="font-mono text-[10px] bg-gray-100 px-1 rounded text-gray-400">${sec.id}</span>
                                <span class="truncate">${sec.title}</span>
                            </button>
                        `).join('')}
                    </div>
                `;
                menu.appendChild(div);
            });
        }

        function showDetail(id) {
            let section;
            ipcData.forEach(ch => {
                const found = ch.sections.find(s => s.id === id);
                if (found) section = found;
            });

            const container = document.getElementById('display-container');
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active-link'));
            document.getElementById(`btn-${id.replace(/\./g, '-')}`).classList.add('active-link');

            if (window.innerWidth < 768) toggleSidebar();

            const imgPath = `img/${id.replace(/\./g, '-')}.jpg`;

            container.innerHTML = `
                <div class="bg-white rounded-3xl shadow-xl border overflow-hidden animate-in fade-in slide-in-from-bottom-4 duration-500 h-full md:h-auto flex flex-col">
                    <div class="p-5 bg-white border-b flex-shrink-0 flex justify-between items-end">
                        <div>
                            <span class="text-indigo-600 font-black text-[10px] uppercase tracking-widest italic leading-none">IPC-A-610 Standard</span>
                            <h2 class="text-xl md:text-2xl font-black text-gray-900 mt-1 uppercase leading-tight">${id} ${section.title}</h2>
                        </div>
                    </div>

                    <div class="p-4 md:p-8 overflow-y-auto flex-grow space-y-6 md:space-y-10">
                        <div class="aspect-video bg-gray-50 rounded-2xl border-2 border-dashed border-gray-200 flex items-center justify-center overflow-hidden shadow-inner">
                            <img src="${imgPath}" alt="${section.title}" 
                                 onerror="this.parentElement.innerHTML='<div class=\'text-center p-4 text-gray-300\'><i class=\'fa-solid fa-camera text-4xl mb-2 opacity-50\'></i><br><span class=\'font-mono text-[10px]\'>img/${id.replace(/\./g, '-')}.jpg</span></div>'"
                                 class="max-w-full max-h-full object-contain">
                        </div>

                        <div class="grid gap-4">
                            <div class="pl-4 py-4 bg-emerald-50 rounded-2xl border-l-8 border-emerald-500 shadow-sm transition-all">
                                <h4 class="text-emerald-700 font-black text-[10px] uppercase mb-1 tracking-widest">Cieľový stav</h4>
                                <p class="text-emerald-900 text-sm font-bold leading-snug">${section.target}</p>
                            </div>
                            <div class="pl-4 py-4 bg-amber-50 rounded-2xl border-l-8 border-amber-500 shadow-sm transition-all">
                                <h4 class="text-amber-700 font-black text-[10px] uppercase mb-1 tracking-widest">Prijateľné</h4>
                                <p class="text-amber-900 text-sm font-bold leading-snug">${section.acceptable}</p>
                            </div>
                            <div class="pl-4 py-4 bg-red-50 rounded-2xl border-l-8 border-red-500 shadow-sm transition-all">
                                <h4 class="text-red-700 font-black text-[10px] uppercase mb-1 tracking-widest">Defekt</h4>
                                <p class="text-red-900 text-sm font-bold leading-snug">${section.defect}</p>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        initMenu();
    </script>
</body>

</html>
