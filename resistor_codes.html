<!DOCTYPE html>
<html lang="sk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resistor Decoder Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .resistor-body {
            transition: background-color 0.3s;
            position: relative;
        }

        .band {
            width: 12px;
            height: 100%;
            position: absolute;
            box-shadow: inset 1px 0 2px rgba(0, 0, 0, 0.2);
        }

        /* Farby pre pásiky */
        .bg-black {
            background-color: #000;
        }

        .bg-brown {
            background-color: #8B4513;
        }

        .bg-red {
            background-color: #FF0000;
        }

        .bg-orange {
            background-color: #FFA500;
        }

        .bg-yellow {
            background-color: #FFFF00;
        }

        .bg-green {
            background-color: #008000;
        }

        .bg-blue {
            background-color: #0000FF;
        }

        .bg-violet {
            background-color: #EE82EE;
        }

        .bg-grey {
            background-color: #808080;
        }

        .bg-white {
            background-color: #FFFFFF;
        }

        .bg-gold {
            background-color: #FFD700;
        }

        .bg-silver {
            background-color: #C0C0C0;
        }
    </style>
</head>

<body class="bg-gray-100 min-h-screen font-sans">

    <div class="max-w-4xl mx-auto py-10 px-4">
        <header class="text-center mb-10">
            <h1 class="text-4xl font-bold text-gray-800">Resistor Codes Decoder</h1>
            <p class="text-gray-600 mt-2">Profesionálny nástroj pre výpočet odporu</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <div class="bg-white p-6 rounded-xl shadow-lg col-span-1">
                <h2 class="text-xl font-semibold mb-4 border-b pb-2">Nastavenia</h2>

                <label class="block mb-2 text-sm font-medium text-gray-700">Typ rezistora</label>
                <select id="bandCount" class="w-full p-2 mb-4 border rounded-md shadow-sm" onchange="initApp()">
                    <option value="4">4 pásiky (standard)</option>
                    <option value="5">5 pásikov (precision)</option>
                </select>

                <label class="block mb-2 text-sm font-medium text-gray-700">Farba tela</label>
                <select id="bodyColor" class="w-full p-2 mb-6 border rounded-md shadow-sm" onchange="updateVisuals()">
                    <option value="#dff5df">Svetlo zelená</option>
                    <option value="#dfefff">Svetlo modrá</option>
                    <option value="#F5F5F5">Sivobiela</option>
                </select>

                <div id="selectors" class="space-y-3">
                </div>
            </div>

            <div
                class="bg-white p-6 rounded-xl shadow-lg col-span-1 md:col-span-2 flex flex-col items-center justify-center">

                <div class="relative w-full h-32 flex items-center justify-center mb-10">
                    <div class="absolute w-full h-1 bg-gray-400"></div>
                    <div id="resistorBody"
                        class="w-64 h-16 rounded-2xl border-2 border-gray-400 z-10 flex justify-around overflow-hidden shadow-md">
                    </div>
                </div>

                <div class="text-center p-6 bg-blue-50 w-full rounded-lg border-2 border-blue-200">
                    <span class="text-sm text-blue-600 uppercase font-bold tracking-widest">Nameraná hodnota</span>
                    <div id="resultValue" class="text-5xl font-black text-blue-900 mt-1">-- Ω</div>
                    <div id="resultTolerance" class="text-xl text-blue-700 mt-1">±0%</div>
                </div>

                <div class="mt-10 w-full border-t pt-6">
                    <h3 class="text-lg font-bold mb-4">SMD Kód Dekodér</h3>
                    <div class="flex gap-2">
                        <input type="text" id="smdInput" placeholder="Napr. 472 alebo 10R0"
                            class="flex-1 p-2 border rounded-md">
                        <button onclick="decodeSMD()"
                            class="bg-gray-800 text-white px-4 py-2 rounded-md hover:bg-black transition">Dekódovať</button>
                    </div>
                    <div id="smdResult" class="mt-2 font-mono text-blue-600"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const bandColors = {
            "Black": { val: 0, mult: 1 }, "Brown": { val: 1, mult: 10, tol: "±1%" },
            "Red": { val: 2, mult: 100, tol: "±2%" }, "Orange": { val: 3, mult: 1000 },
            "Yellow": { val: 4, mult: 10000 }, "Green": { val: 5, mult: 100000, tol: "±0.5%" },
            "Blue": { val: 6, mult: 1000000, tol: "±0.25%" }, "Violet": { val: 7, tol: "±0.1%" },
            "Grey": { val: 8, tol: "±0.05%" }, "White": { val: 9 },
            "Gold": { mult: 0.1, tol: "±5%" }, "Silver": { mult: 0.01, tol: "±10%" }
        };

        function initApp() {
            const count = parseInt(document.getElementById('bandCount').value);
            const selectors = document.getElementById('selectors');
            selectors.innerHTML = '';

            for (let i = 1; i <= count; i++) {
                let label = i < count - 1 ? `Pásik ${i}` : (i === count - 1 ? 'Násobiteľ' : 'Tolerancia');
                let options = Object.keys(bandColors).map(color => {
                    if (i === count && !bandColors[color].tol) return ''; // Preskoč farby bez tolerancie pre posledný pásik
                    return `<option value="${color}">${color}</option>`;
                }).join('');

                selectors.innerHTML += `<div><label class="text-xs text-gray-500">${label}</label>
                <select class="w-full p-1 border rounded band-sel" onchange="updateVisuals()">${options}</select></div>`;
            }
            updateVisuals();
        }

        function updateVisuals() {
            const selects = document.querySelectorAll('.band-sel');
            const body = document.getElementById('resistorBody');
            const count = selects.length;

            body.style.backgroundColor = document.getElementById('bodyColor').value;
            body.innerHTML = '';

            let digits = "";
            let multiplier = 1;
            let tolerance = "";

            selects.forEach((s, i) => {
                const color = s.value;
                const band = document.createElement('div');
                band.className = `band bg-${color.toLowerCase()}`;
                band.style.left = `${(i + 1) * (100 / (count + 1))}%`;
                body.appendChild(band);

                if (i < count - 2) digits += bandColors[color].val;
                else if (i === count - 2) multiplier = bandColors[color].mult;
                else tolerance = bandColors[color].tol;
            });

            const totalOhms = parseInt(digits) * multiplier;
            document.getElementById('resultValue').innerText = formatOhm(totalOhms);
            document.getElementById('resultTolerance').innerText = tolerance;
        }

        function formatOhm(val) {
            if (val >= 1000000) return (val / 1000000).toFixed(2) + " MΩ";
            if (val >= 1000) return (val / 1000).toFixed(2) + " kΩ";
            return val.toFixed(1) + " Ω";
        }

        function decodeSMD() {
            let code = document.getElementById('smdInput').value.toUpperCase().trim();
            let result = "";
            if (code.includes('R')) {
                result = code.replace('R', '.') + " Ω";
            } else if (!isNaN(code)) {
                let mult = parseInt(code.slice(-1));
                let val = code.slice(0, -1);
                result = formatOhm(parseInt(val) * Math.pow(10, mult));
            }
            document.getElementById('smdResult').innerText = "Výsledok: " + (result || "Neplatný kód");
        }

        initApp();
    </script>
</body>

</html>
