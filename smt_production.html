<!DOCTYPE html>
<html lang="sk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMT Production Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .data-table th {
            padding: 0.5rem;
            font-size: 0.75rem;
            text-transform: uppercase;
            color: #6b7280;
            text-align: center;
        }

        .data-table td {
            padding: 0.5rem;
            font-size: 0.875rem;
            border-top: 1px solid #e5e7eb;
            text-align: center;
        }
    </style>
</head>

<body class="bg-gray-100 min-h-screen p-4 md:p-8">

    <div class="max-w-4xl mx-auto bg-white rounded-3xl shadow-xl overflow-hidden">
        <div class="bg-indigo-700 p-6 text-white flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-bold italic">SMT Production Line #1</h1>
                <p class="text-indigo-200 text-xs uppercase tracking-widest">Sledovanie a odvádzanie výroby</p>
            </div>
            <a href="index.html"
                class="bg-indigo-800 hover:bg-indigo-900 px-4 py-2 rounded-lg text-sm transition">Späť</a>
        </div>

        <div class="p-6 grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="md:col-span-1 space-y-4 border-r border-gray-100 pr-6">
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase mb-1">Číslo príkazu / Order</label>
                    <input type="text" id="orderNo" placeholder="napr. MO-2026-001"
                        class="w-full p-3 bg-gray-50 border rounded-xl outline-none focus:ring-2 focus:ring-indigo-500">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase mb-1">Vyrobené kusy (Aktuálne)</label>
                    <div class="flex gap-2">
                        <input type="number" id="qtyInput" value="1"
                            class="w-full p-3 bg-gray-50 border rounded-xl text-center text-xl font-bold">
                        <button onclick="addProduction()"
                            class="bg-indigo-600 text-white px-6 rounded-xl hover:bg-indigo-700 transition">
                            <i class="fa-solid fa-plus"></i>
                        </button>
                    </div>
                </div>
                <div class="pt-4">
                    <button onclick="reportDowntime()"
                        class="w-full py-3 bg-red-100 text-red-600 rounded-xl font-bold text-sm hover:bg-red-200 transition">
                        <i class="fa-solid fa-circle-exclamation mr-2"></i>NAHLÁSIŤ PRESTOJ
                    </button>
                </div>
            </div>

            <div class="md:col-span-2 space-y-6">
                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-gray-50 p-4 rounded-2xl border border-gray-100">
                        <span class="text-xs font-bold text-gray-400 uppercase">Celkovo vyrobené</span>
                        <div id="totalQty" class="text-3xl font-black text-indigo-900">0</div>
                    </div>
                    <div class="bg-gray-50 p-4 rounded-2xl border border-gray-100">
                        <span class="text-xs font-bold text-gray-400 uppercase">Aktuálna OEE</span>
                        <div id="oeeVal" class="text-3xl font-black text-green-600">-- %</div>
                    </div>
                </div>

                <div class="bg-white rounded-2xl border border-gray-100 overflow-hidden">
                    <table class="w-full data-table">
                        <thead class="bg-gray-50">
                            <tr>
                                <th>Čas</th>
                                <th>Udalosť</th>
                                <th>Množstvo</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody id="logTable">
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        let total = 0;

        function addProduction() {
            const qty = parseInt(document.getElementById('qtyInput').value);
            const order = document.getElementById('orderNo').value || "Default Order";
            if (isNaN(qty) || qty <= 0) return;

            total += qty;
            document.getElementById('totalQty').innerText = total.toLocaleString();

            addLogRow(order, qty, "Vyrobené", "text-green-600");
            updateOEE();
        }

        function reportDowntime() {
            addLogRow("Línia zastavená", "-", "Prestoj", "text-red-600 font-bold");
        }

        function addLogRow(order, qty, status, statusClass) {
            const table = document.getElementById('logTable');
            const now = new Date().toLocaleTimeString('sk-SK', { hour: '2-digit', minute: '2-digit' });
            const row = `<tr>
                <td>${now}</td>
                <td class="text-left font-medium">${order}</td>
                <td>${qty}</td>
                <td class="${statusClass}">${status}</td>
            </tr>`;
            table.insertAdjacentHTML('afterbegin', row);
        }

        function updateOEE() {
            // Simulácia OEE výpočtu
            const randomOEE = (Math.random() * (98 - 85) + 85).toFixed(1);
            document.getElementById('oeeVal').innerText = randomOEE + " %";
        }
    </script>
</body>

</html>
